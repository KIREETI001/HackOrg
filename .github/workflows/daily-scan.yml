name: Daily Competition Scan

on:
  # Daily at 08:00 UTC (16:00 SGT).
  schedule:
    - cron: "0 8 * * *"
  # Manual trigger from the Actions tab.
  workflow_dispatch:

permissions:
  contents: write   # so the bot can push the updated events.json

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scraper/requirements.txt

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run scanner
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scraper/scrape.py

      - name: Commit & push if changed
        run: |
          git config user.name  "scanner-bot"
          git config user.email "scanner-bot@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No changes — nothing to commit."
          else
            git commit -m "🔍 Daily scan $(date -u +%Y-%m-%d)"
            git push
          fi
